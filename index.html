<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カラオケMBTI診断</title>
<style>
* { box-sizing: border-box; }

:root {
  --glass-main: rgba(255,255,255,0.88);
  --glass-sub:  rgba(255,255,255,0.70);
  --shadow-main: 0 18px 40px rgba(0,0,0,0.18);
  --shadow-sub:  0 10px 22px rgba(0,0,0,0.12);
  --shadow-btn:  0 6px 18px rgba(0,0,0,0.16);

  --neg-strong:#6ea8fe;
  --neg-weak:#a9c7ff;
  --neutral:#e5e7eb;
  --pos-weak:#f9c89b;
  --pos-strong:#f2a65a;

  /* 16Personalities風 同意=緑 / 不同意=紫 */
  --agr-strong:#21a366;
  --agr-mid:#5cc18e;
  --agr-weak:#a9e0c2;
  --dis-strong:#8e5cd9;
  --dis-mid:#b08ae6;
  --dis-weak:#d8c6f2;
  --neu:#c9ccd1;

  /* タイプ別グループ色（結果画面で使用） */
  --type-color:#6ea8fe;
}



/* ===== Header ===== */
.header{
  position:fixed;
  inset:0 0 auto 0;
  padding:18px 28px 14px;
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.6);
  z-index:10;
}
.header h1{ margin:0 0 10px; text-align:center; }
.progress-wrap{height:8px;background:#eee;}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--neg-strong),var(--pos-strong));
  transition:width .3s ease;
}

/* ===== Stage ===== */
.stage{ 
padding-top:90px;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

}
.deck{
  position:relative;
  width:min(1000px,95vw);
  height:520px;
}

/* ===== Card Shell ===== */
.card-shell{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:transform .35s ease, opacity .25s ease;
}
.card-shell.active{ transform:translateX(0); opacity:1; z-index:3; }
.card-shell.prev{ transform:translateX(-40%) scale(.96); opacity:.35; z-index:1; cursor:pointer; }
.card-shell.next{ transform:translateX(40%) scale(.96); opacity:.35; z-index:1; }
.card-shell.fade-out{ opacity:0; }
.card-shell.fade-in{ opacity:.35; }

/* ===== Card ===== */
.card{
  width:100%;
  height:100%;
  padding:40px;
  border-radius:28px;
  backdrop-filter:blur(18px);
  background:var(--glass-main);
  box-shadow:var(--shadow-main);
}

/* ===== Content ===== */
.content{ position:relative; width:100%; height:100%; }
.q-text{
  margin-top:10px;
  font-size:22px;
  font-weight:600;
  text-align:center;
}

/* ===== Scale ===== */
.scale{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:space-between;
  width:100%;
  max-width:900px;
}
.choice{
  border-radius:50%;
  background:#fff;
  border:3px solid var(--neu);
  box-shadow:var(--shadow-btn);
  cursor:pointer;
  transition:.15s;
}
.choice.big{width:96px;height:96px;}
.choice.mid{width:78px;height:78px;}
.choice.small{width:62px;height:62px;}
.choice.tiny{width:50px;height:50px;}
.choice:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,.22);
}

/* 枠線の色（不同意=紫 / 同意=緑） */
.choice.dis-strong{border-color:var(--dis-strong);}
.choice.dis-mid{border-color:var(--dis-mid);}
.choice.dis-weak{border-color:var(--dis-weak);}
.choice.neu{border-color:var(--neu);}
.choice.agr-weak{border-color:var(--agr-weak);}
.choice.agr-mid{border-color:var(--agr-mid);}
.choice.agr-strong{border-color:var(--agr-strong);}

/* ホバー・選択時は枠色で塗りつぶす */
.choice.dis-strong:hover,.choice.dis-strong.selected{background:var(--dis-strong);}
.choice.dis-mid:hover,.choice.dis-mid.selected{background:var(--dis-mid);}
.choice.dis-weak:hover,.choice.dis-weak.selected{background:var(--dis-weak);}
.choice.neu:hover,.choice.neu.selected{background:var(--neu);}
.choice.agr-weak:hover,.choice.agr-weak.selected{background:var(--agr-weak);}
.choice.agr-mid:hover,.choice.agr-mid.selected{background:var(--agr-mid);}
.choice.agr-strong:hover,.choice.agr-strong.selected{background:var(--agr-strong);}

/* ===== selected ===== */
.choice.selected{
  box-shadow:
    0 0 0 3px rgba(0,0,0,.08),
    0 20px 40px rgba(0,0,0,.25);
  transform:scale(1.08);
}

.card-shell.prev .choice{pointer-events:none;}

/* ===== Foot ===== */
.scale-foot{
  position:absolute;
  bottom:10px;
  width:100%;
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  color:#666;
}

/* ===== Result Songs (no scroll / always 3 columns) ===== */

.songs{
  margin-top:16px;
  display:flex;
  justify-content:center;
  gap:50px;
}

/* 曲カードをコンパクトに保持 */
.song-card{
  width:180px;                 /* 3枚が確実に収まる */
  padding:8px;
  background:rgba(255,255,255,.85);
  border-radius:14px;
  box-shadow:var(--shadow-sub);
  text-align:center;
}

/* ジャケット画像を小さく固定 */
.song-card img{
  width:100%;
  height:110px;                /* ★ ここが最重要 */
  object-fit:cover;            /* 比率維持 */
  border-radius:10px;
  margin-bottom:6px;
}

/* テキストを少し圧縮 */
.song-title{
  font-size:13px;
  font-weight:600;
}

.song-artist{
  font-size:12px;
  color:#555;
}

.song-number{
  font-size:11px;
  color:#888;
}

/* 結果画面：見出し中央ぞろえ */
.content h3{
  text-align: center;
}

/* 結果画面の説明文 */
.content p{
  text-align: center;
}

/* 楽曲リンクの見た目を通常カードのままに */
.song-link{
  text-decoration: none;
  color: inherit;
  display: block;
}

/* ホバー時に「押せる感」を出す（おすすめ） */
.song-link:hover .song-card{
  transform: translateY(-4px);
  box-shadow: 0 18px 36px rgba(0,0,0,0.18);
  transition: .2s;
}

/* ===== Retry Button ===== */

.retry-wrap{
  margin-top: 32px;
  text-align: center;
}

.retry-btn{
  padding: 16px 42px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--neg-strong), var(--pos-strong));
  color: #fff;
  box-shadow: var(--shadow-btn);
  transition: transform .15s, box-shadow .15s;
}

.retry-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 30px rgba(0,0,0,.22);
}

/* 診断結果メインのタイプ名 */
.mbti-nickname-main{
  text-align: center;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 14px;
  letter-spacing: 0.06em;
}

/* キャラクター画像表示 */
.character-wrap{
  display: flex;
  justify-content: center;
  margin: 12px 0 18px;
}


.character-image{
  width: 360px;
  height: 470px;            /* 縦長にして判断型バー付近まで届かせる */
  object-fit: cover;        /* 左右の余白を切る（図は中央寄せ） */
  object-position: center;
  transform: none;
  border-radius: 12px;
}


/* 結果画面専用：カードを縦に大きくする */
.result-card{
  min-height: 760px;   /* ★ 好みで 720〜820px に調整可 */
}

/* 上段：2カラム（PC）
   左に「見出し(head)＋本文(body)」を縦に、右に「キャラ画像(char)」を配置 */
.result-top{
  display: grid;
  grid-template-columns: 1fr 380px;
  grid-template-areas:
    "head char"
    "body char";
  column-gap: 32px;
  align-items: start;
  margin-top: 32px;
}

.result-head{ grid-area: head; text-align: left; margin-top: 32px; }
.result-body{ grid-area: body; text-align: left; }
.result-character{ grid-area: char; }

.result-text{
  text-align: left;
  margin-top: 32px;
}

.result-nickname{
font-size: 40px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 8px
}

.result-mbti{
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: #666;
  margin-bottom: 20px; /* 説明文との距離も少し広げる */
}

.result-description{
  font-size: 20px;
  line-height: 1.8;
  text-align: left;

}

.result-character{
  display: flex;
  justify-content: center;
}

.character-image{
  width: 360px;
  height: 470px;           /* 縦長にして判断型バー付近まで届かせる */
  object-fit: cover;       /* 左右の余白を切る（図は中央寄せ） */
  object-position: center;
  transform: none;
  border-radius: 12px;
}

.result-bottom{
  margin-top: 28px;
  padding-bottom: 20px;
}

.result-bottom h3{
  text-align: center;
}

/* 結果画面だけスクロール可能にする */
.result-screen{
  max-width: 1100px;
  height: auto;
  overflow: visible;
  margin: 0 auto;
  padding-bottom: 20px;

}
/* ===== TOP Overlay ===== */
.top-overlay{
  position: fixed;                 /* 画面基準で固定 */
  inset: 0;                        /* 上下左右すべて覆う */
  z-index: 10000;                  /* ヘッダーやカードより前 */
  background: linear-gradient(135deg,#f8fafd,#eef3fa);

  display: flex;                   /* 中央寄せ */
  align-items: center;
  justify-content: center;
}
.top-overlay .start-btn{
  padding: 14px 44px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  margin-bottom: 32px;
  background: linear-gradient(135deg,var(--neg-strong),var(--pos-strong));
  color: #fff;
  box-shadow: var(--shadow-btn);
}

.top-overlay .start-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 30px rgba(0,0,0,.22);
}

.top-overlay-inner{
  text-align: center;
}

.top-overlay h1{ /* TOP画面タイトルサイズ */
  font-size: 60px;
  font-weight: 900;
  margin-bottom: 32px;
}

.top-overlay button{
  padding: 14px 44px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  margin-bottom: 32px;
  background: linear-gradient(135deg,var(--neg-strong),var(--pos-strong));
  color: #fff;
}

.top-overlay img{
  max-width: 1700px;
  max-height: 55vh;
  width: 100%;
  height: auto;
  object-fit: contain;
}
.top-overlay{
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: linear-gradient(135deg,#f8fafd,#eef3fa);

}

.top-overlay-inner{
  text-align: center;
  transform: translateY(-40px);
}

/* ボタンと画像の間隔 */
.top-image-wrap{
  margin-top: 24px;
}

/* =========================================================
   スマートフォン最適化（決定版・末尾で優先適用）
   ※ PC版レイアウトはそのまま。スマホ(≤768px)だけを再構成。
   TOP / 質問 / 結果 の全画面をスマホ向けに整える。
   ========================================================= */
@media (max-width: 768px){

  html, body{
    overflow-x: hidden;
    overflow-y: auto;
  }
  body{
    -webkit-text-size-adjust: 100%;   /* 自動文字拡大を無効化 */
  }

  /* ---------- TOP画面（診断開始）：画面中央に配置 ---------- */
  .top-overlay{
    align-items: center;              /* 上下中央 */
    justify-content: center;          /* 左右中央 */
    overflow-y: auto;
    padding: 24px 20px;
  }
  .top-overlay-inner{
    transform: none;                  /* PCの translateY を解除 */
    width: 100%;
    max-width: 460px;
    margin: auto;                     /* はみ出す場合も中央維持 */
  }
  .top-overlay h1{
    font-size: clamp(28px, 8vw, 40px);
    line-height: 1.2;
    margin-bottom: 22px;
  }
  .top-overlay .start-btn,
  .top-overlay button{
    padding: 14px 46px;
    font-size: 17px;
    margin-bottom: 22px;
  }
  .top-image-wrap{
    margin-top: 16px;
  }
  .top-overlay img{
    width: 100%;
    max-height: 40vh;
    object-fit: contain;
  }

  /* ---------- ヘッダー（固定・進捗バー） ---------- */
  .header{
    padding: 12px 16px 10px;
  }
  .header h1{
    font-size: 19px;
    margin: 0 0 8px;
  }
  .progress-num{
    font-size: 12px;
  }

  /* ---------- ステージ / デッキ（質問カードは縦スライド） ---------- */
  /* デッキを画面全体に広げ、はみ出したカードは「画面の外」だけで自然に見切れる。
     小さな箱で切り取らない（意図的な表示範囲を作らない）。 */
  .stage{
    height: 100vh;
    min-height: 100vh;
    align-items: stretch;
    padding: 0;
  }
  .deck{
    position: relative;
    width: 100%;
    max-width: 100%;
    height: 100vh;                    /* 画面全体を基準に */
    overflow: hidden;                 /* 画面の外だけ自然に見切れる */
  }

  /* ---------- カード（縦方向スライド・カルーセル） ---------- */
  /* 質問カードだけ絶対配置で重ねる（結果カードは除外）。高さは内容にフィット。
     前後カードは画面内に収まる範囲はすべて表示し、画面の外だけで見切れる。
     前カードはタップで戻れる（PC同様）。 */
  .card-shell:not(.result-shell){
    position: absolute;
    left: 16px;
    right: 16px;
    top: 50%;                         /* 画面中央に配置 */
    bottom: auto;                     /* inset:0 の bottom を解除し高さを内容依存に */
    height: auto;                     /* 内容の高さにフィット（余白を圧縮） */
    display: block;
    transition: transform .35s ease, opacity .3s ease;
  }
  .card-shell:not(.result-shell).active{
    transform: translateY(-50%) scale(1);
    opacity: 1;                                /* 中央カードははっきり表示（回答対象） */
    z-index: 3;
  }
  .card-shell:not(.result-shell).prev{
    transform: translateY(-150%) scale(.95);   /* 真上（画面上端の外へ自然に抜ける） */
    opacity: .4;                               /* 前カードは薄く（Web版と同様） */
    z-index: 2;
    cursor: pointer;                           /* ← タップで前の質問に戻れる */
  }
  .card-shell:not(.result-shell).next{
    transform: translateY(50%) scale(.95);     /* 真下（画面下端の外へ自然に抜ける） */
    opacity: .4;                               /* 次カードは薄く */
    z-index: 1;
    pointer-events: none;                      /* 次カードはタップ無効 */
  }
  /* スライドで抜けるカードはしっかりフェードアウトさせる */
  .card-shell:not(.result-shell).fade-out{
    opacity: 0;
  }
  .card{
    height: auto;                     /* 内容にフィット：上下の余白を圧縮 */
    padding: 22px 20px;
    border-radius: 20px;
    box-shadow: 0 5px 16px rgba(0,0,0,0.08);  /* 影を小さく（画面端に干渉しない） */

  .scale{

/* =========================================================
   診断ロジック（旧 scorer / mbti / recommender を移植）
   ========================================================= */
const THRESHOLD=0.25;

function scoreAnswers(qs,ans){
  const scores={E_I:0,S_N:0,T_F:0,J_P:0};
  const counts={E_I:0,S_N:0,T_F:0,J_P:0};
  for(const q of qs){
    if(!(q.id in ans)) continue;
    scores[q.axis]+=ans[q.id]*q.direction;
    counts[q.axis]++;
  }
  for(const ax in scores){ if(counts[ax]>0) scores[ax]/=counts[ax]; }
  return scores;
}

function judgeAxis(score,pos,neg){
  if(score>THRESHOLD) return pos;
  if(score<-THRESHOLD) return neg;
  return Math.random()<0.5?pos:neg; // 差が小さい場合は揺らぎを許容
}

function determineMbti(s){
  return judgeAxis(s.E_I,"E","I")+judgeAxis(s.S_N,"S","N")+
         judgeAxis(s.T_F,"T","F")+judgeAxis(s.J_P,"J","P");
}

function axisPosition(val,maxAbs=4.0){
  if(Math.abs(val)<0.3) return 50;
  const v=Math.max(-maxAbs,Math.min(maxAbs,val));
  return Math.trunc((v+maxAbs)/(2*maxAbs)*100);
}

function getEiSuffix(mbti,trap){
  const primary=mbti[0];
  if(trap===undefined||trap===null||Math.abs(trap)<0.3) return "-"+primary;
  if(primary==="E") return trap>0?"-e":"-E";
  return trap<0?"-i":"-I";
}

function recommend(scores,topN=3){
  return SONGS
    .map(s=>({s,d:Math.hypot(s.E_I-scores.E_I,s.S_N-scores.S_N,s.T_F-scores.T_F,s.J_P-scores.J_P)}))
    .sort((a,b)=>a.d-b.d)
    .slice(0,topN)
    .map(x=>x.s);
}

// 旧 /diagnose API と同じ形のオブジェクトを返す
function diagnose(answers){
  const scores=scoreAnswers(QUESTIONS,answers);
  const mbti=determineMbti(scores);
  const diag=MBTI_DESCRIPTIONS[mbti];
  const display_mbti=mbti+getEiSuffix(mbti,answers["Q_TRAP_EI"]);
  return {
    mbti,
    display_mbti,
    nickname:diag.nickname,
    title:diag.title,
    description:diag.text,
    character_image:`character/${mbti}_${diag.nickname}.png`,
    scores,
    axis_position:{
      E_I:axisPosition(scores.E_I),
      S_N:axisPosition(scores.S_N),
      T_F:axisPosition(scores.T_F),
      J_P:axisPosition(scores.J_P)
    },
    recommended_songs:recommend(scores,3).map(s=>({
      title:s.title,
      artist:s.artist,
      number:s.number,
      jacket_path:`jacket/${s.jacket}`,
      link:s.link
    }))
  };
}

let questions=QUESTIONS,current=0,answers={},anim=false;

const progressNum=document.getElementById("progressNum");

function updateBar(){
  bar.style.width=(current/questions.length*100)+"%";
  const n=Math.min(current+1,questions.length);
  progressNum.textContent=`${n} / ${questions.length}`;
}

// MBTI を4グループに分類（結果画面のテーマ色・バッジ用）
function typeGroup(mbti){
  const isN=mbti.includes("N"), isT=mbti.includes("T"), isJ=mbti.includes("J");
  if(isN&&isT)  return {cls:"theme-analyst",  name:"分析家"};
  if(isN&&!isT) return {cls:"theme-diplomat", name:"外交官"};
  if(!isN&&isJ) return {cls:"theme-sentinel", name:"番人"};
  return {cls:"theme-explorer", name:"探検家"};
}

// 16Personalities風の軸バーHTMLを生成
// pos = 0〜100（正の特性 E/S/T/J 側の割合）
function axisRow(pos,leftName,rightName){
  const left=Math.round(pos), right=100-left;
  const domLeft=left>=right;
  return `
    <div class="axis-item">
      <div class="axis-top">
        <span class="${domLeft?'dom':''}">${leftName} ${left}%</span>
        <span class="${domLeft?'':'dom'}">${right}% ${rightName}</span>
      </div>
      <div class="axis-track">
        <div class="seg ${domLeft?'on':''}" style="width:${left}%"></div>
        <div class="seg ${domLeft?'':'on'}" style="width:${right}%"></div>
      </div>
    </div>`;
}

function buildAxes(ap){
  return (
    axisRow(ap.E_I,"外向型","内向型")+
    axisRow(ap.S_N,"感覚型","直観型")+
    axisRow(ap.T_F,"思考型","感情型")+
    axisRow(ap.J_P,"判断型","知覚型")
  );
}

function render(){
  deck.innerHTML="";
  if(current>0) deck.appendChild(makeCard(current-1,"prev"));
  deck.appendChild(makeCard(current,"active"));
  if(current+1<questions.length)
    deck.appendChild(makeCard(current+1,"next"));
}

function makeCard(i,pos){
  const el=document.createElement("div");
  el.className=`card-shell ${pos}`;
  el.innerHTML=`
    <div class="card">
      <div class="content">
        <div class="q-text">${questions[i].text}</div>
        <div class="scale">
          ${SCALE.map(s=>`<div class="choice ${s.cls}" data-v="${s.v}"></div>`).join("")}
        </div>
        <div class="scale-foot">
          <span>当てはまらない</span>
          <span>当てはまる</span>
        </div>
      </div>
    </div>
  `;

  if(answers[questions[i].id]!==undefined){
    const sel=el.querySelector(`.choice[data-v="${answers[questions[i].id]}"]`);
    if(sel) sel.classList.add("selected");
  }

  if(pos==="active"){
    el.querySelectorAll(".choice").forEach(btn=>{
      btn.onclick=()=>{
        if(anim)return;
        anim=true;

        el.querySelectorAll(".choice").forEach(c=>c.classList.remove("selected"));
        btn.classList.add("selected");

        answers[questions[current].id]=Number(btn.dataset.v);

        const prev=document.querySelector(".card-shell.prev");
        const next=document.querySelector(".card-shell.next");

        if(prev) prev.classList.add("fade-out");

        if(current+2<questions.length){
          const newNext=makeCard(current+2,"next");
          newNext.style.opacity="0";      // まず透明で追加
          deck.appendChild(newNext);
          void newNext.offsetWidth;        // opacity:0 を確定させる（reflow）
          newNext.style.opacity="";        // → CSSの透明度へ向けてフェードイン
        }

        el.classList.remove("active");
        el.classList.add("prev");

        if(next){
          next.classList.remove("next");
          next.classList.add("active");
        }

        setTimeout(()=>{
          current++;
          anim=false;

          if(current === questions.length){
            fetchResult();   // ← ★ ここが今回の修正点
          }else{
            updateBar();
            render();
          }
        },350);
      };
    });
  }

  if(pos==="prev"){
    el.onclick=()=>{
      if(anim)return;
      anim=true;

      const active=document.querySelector(".card-shell.active");
      active.classList.remove("active");
      active.classList.add("next","fade-out");

      el.classList.remove("prev");
      el.classList.add("active");

      setTimeout(()=>{
        current=i;
        for(let k=i+1;k<questions.length;k++)
          delete answers[questions[k].id];
        anim=false;
        updateBar();
        render();
      },350);
    };
  }

  return el;
}


function fetchResult(){
  bar.style.width = "100%"
  document.body.classList.add("result-mode");

  const d = diagnose(answers);
  deck.innerHTML="";

    const g = typeGroup(d.mbti);

    const res=document.createElement("div");
    res.className="card-shell active result-shell";

    res.innerHTML = `
      <div class="result-screen ${g.cls}">

      <!-- 上段：左テキスト / 右キャラ -->
      <div class="result-top">

        <!-- 見出し：グループ / ニックネーム / MBTI -->
        <div class="result-head">
          <div class="result-group">${g.name}</div>
          <div class="result-nickname">${d.nickname}</div>
          <div class="result-mbti">${d.display_mbti}</div>
        </div>

        <!-- キャラクター画像 -->
        <div class="result-character">
          <img src="${d.character_image}" class="character-image">
        </div>

        <!-- 本文：説明 / 軸バー -->
        <div class="result-body">
          <div class="result-description">
            ${d.description}
          </div>

          <div class="axis-area">
            ${buildAxes(d.axis_position)}
            <div class="axis-note">
              ※ バーは、それぞれの特性のバランスを表しています
            </div>
          </div>
        </div>

      </div>

      <!-- 下段：楽曲 -->
      <div class="result-bottom">
        <h3>おすすめ楽曲</h3>

        <div class="songs">
          ${d.recommended_songs.map(s=>`
            <a class="song-link" href="${s.link}" target="_blank" rel="noopener">
              <div class="song-card">
                <img src="${s.jacket_path}">
                <div class="song-title">${s.title}</div>
                <div class="song-artist">${s.artist}</div>
                <div class="song-number">${s.number}</div>
              </div>
            </a>
          `).join("")}
        </div>

        <div class="share-wrap">
          <button id="copyBtn" class="share-btn" type="button">結果をコピー</button>
          <button id="shareBtn" class="share-btn" type="button">シェアする</button>
        </div>

        <div class="retry-wrap">
          <button id="retryBtn" class="retry-btn">もう一度診断する</button>
        </div>
      </div>

      </div>
    `;

    deck.appendChild(res);

    /* ★ 結果のコピー / シェア */
    const shareText = `カラオケ性格診断の結果は「${d.nickname}（${d.display_mbti}）」でした！`;
    const shareUrl = location.href;
    const copyBtn = document.getElementById("copyBtn");
    const shareBtn = document.getElementById("shareBtn");

    function flash(btn,msg){
      const old=btn.textContent;
      btn.textContent=msg;
      setTimeout(()=>{ btn.textContent=old; },1500);
    }
    function copyResult(){
      const text=shareText+" "+shareUrl;
      if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(text)
          .then(()=>flash(copyBtn,"コピーしました"))
          .catch(()=>fallbackCopy(text));
      }else{
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text){
      const ta=document.createElement("textarea");
      ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); flash(copyBtn,"コピーしました"); }
      catch(e){ flash(copyBtn,"コピーできません"); }
      document.body.removeChild(ta);
    }

    copyBtn.onclick=copyResult;
    shareBtn.onclick=()=>{
      if(navigator.share){
        navigator.share({title:"カラオケ性格診断",text:shareText,url:shareUrl}).catch(()=>{});
      }else{
        copyResult();
      }
    };

    /* ★ もう一度診断する */
    document.getElementById("retryBtn").onclick = () => {
      current = 0;
      answers = {};
      bar.style.width = "0%";
      progressNum.textContent = `1 / ${questions.length}`;

      // ★ 結果表示モードを解除して質問画面レイアウトに戻す
      document.body.classList.remove("result-mode");
      deck.style.height = "";

      render();
    };
}
const topOverlay = document.getElementById("topOverlay");
const startBtn = document.getElementById("startBtn");

startBtn.onclick = () => {
  topOverlay.style.display = "none";
};

// ===== 初期表示 =====
render();
updateBar();
