<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カラオケMBTI診断</title>
<style>
* { box-sizing: border-box; }

:root {
  --glass-main: rgba(255,255,255,0.88);
  --glass-sub:  rgba(255,255,255,0.70);
  --shadow-main: 0 18px 40px rgba(0,0,0,0.18);
  --shadow-sub:  0 10px 22px rgba(0,0,0,0.12);
  --shadow-btn:  0 6px 18px rgba(0,0,0,0.16);

  --neg-strong:#6ea8fe;
  --neg-weak:#a9c7ff;
  --neutral:#e5e7eb;
  --pos-weak:#f9c89b;
  --pos-strong:#f2a65a;

  /* 16Personalities風 同意=緑 / 不同意=紫 */
  --agr-strong:#21a366;
  --agr-mid:#5cc18e;
  --agr-weak:#a9e0c2;
  --dis-strong:#8e5cd9;
  --dis-mid:#b08ae6;
  --dis-weak:#d8c6f2;
  --neu:#c9ccd1;

  /* タイプ別グループ色（結果画面で使用） */
  --type-color:#6ea8fe;
}



/* ===== Header ===== */
.header{
  position:fixed;
  inset:0 0 auto 0;
  padding:18px 28px 14px;
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.6);
  z-index:10;
}
.header h1{ margin:0 0 10px; text-align:center; }
.progress-wrap{height:8px;background:#eee;}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--neg-strong),var(--pos-strong));
  transition:width .3s ease;
}

/* ===== Stage ===== */
.stage{ 
padding-top:90px;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

}
.deck{
  position:relative;
  width:min(1000px,95vw);
  height:520px;
}

/* ===== Card Shell ===== */
.card-shell{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:transform .35s ease, opacity .25s ease;
}
.card-shell.active{ transform:translateX(0); opacity:1; z-index:3; }
.card-shell.prev{ transform:translateX(-40%) scale(.96); opacity:.35; z-index:1; cursor:pointer; }
.card-shell.next{ transform:translateX(40%) scale(.96); opacity:.35; z-index:1; }
.card-shell.fade-out{ opacity:0; }
.card-shell.fade-in{ opacity:.35; }

/* ===== Card ===== */
.card{
  width:100%;
  height:100%;
  padding:40px;
  border-radius:28px;
  backdrop-filter:blur(18px);
  background:var(--glass-main);
  box-shadow:var(--shadow-main);
}

/* ===== Content ===== */
.content{ position:relative; width:100%; height:100%; }
.q-text{
  margin-top:10px;
  font-size:22px;
  font-weight:600;
  text-align:center;
}

/* ===== Scale ===== */
.scale{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:space-between;
  width:100%;
  max-width:900px;
}
.choice{
  border-radius:50%;
  background:#fff;
  border:3px solid var(--neu);
  box-shadow:var(--shadow-btn);
  cursor:pointer;
  transition:.15s;
}
.choice.big{width:96px;height:96px;}
.choice.mid{width:78px;height:78px;}
.choice.small{width:62px;height:62px;}
.choice.tiny{width:50px;height:50px;}
.choice:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,.22);
}

/* 枠線の色（不同意=紫 / 同意=緑） */
.choice.dis-strong{border-color:var(--dis-strong);}
.choice.dis-mid{border-color:var(--dis-mid);}
.choice.dis-weak{border-color:var(--dis-weak);}
.choice.neu{border-color:var(--neu);}
.choice.agr-weak{border-color:var(--agr-weak);}
.choice.agr-mid{border-color:var(--agr-mid);}
.choice.agr-strong{border-color:var(--agr-strong);}

/* ホバー・選択時は枠色で塗りつぶす */
.choice.dis-strong:hover,.choice.dis-strong.selected{background:var(--dis-strong);}
.choice.dis-mid:hover,.choice.dis-mid.selected{background:var(--dis-mid);}
.choice.dis-weak:hover,.choice.dis-weak.selected{background:var(--dis-weak);}
.choice.neu:hover,.choice.neu.selected{background:var(--neu);}
.choice.agr-weak:hover,.choice.agr-weak.selected{background:var(--agr-weak);}
.choice.agr-mid:hover,.choice.agr-mid.selected{background:var(--agr-mid);}
.choice.agr-strong:hover,.choice.agr-strong.selected{background:var(--agr-strong);}

/* ===== selected ===== */
.choice.selected{
  box-shadow:
    0 0 0 3px rgba(0,0,0,.08),
    0 20px 40px rgba(0,0,0,.25);
  transform:scale(1.08);
}

.card-shell.prev .choice{pointer-events:none;}

/* ===== Foot ===== */
.scale-foot{
  position:absolute;
  bottom:10px;
  width:100%;
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  color:#666;
}

/* ===== Result Songs (no scroll / always 3 columns) ===== */

.songs{
  margin-top:16px;
  display:flex;
  justify-content:center;
  gap:50px;
}

/* 曲カードをコンパクトに保持 */
.song-card{
  width:180px;                 /* 3枚が確実に収まる */
  padding:8px;
  background:rgba(255,255,255,.85);
  border-radius:14px;
  box-shadow:var(--shadow-sub);
  text-align:center;
}

/* ジャケット画像を小さく固定 */
.song-card img{
  width:100%;
  height:110px;                /* ★ ここが最重要 */
  object-fit:cover;            /* 比率維持 */
  border-radius:10px;
  margin-bottom:6px;
}

/* テキストを少し圧縮 */
.song-title{
  font-size:13px;
  font-weight:600;
}

.song-artist{
  font-size:12px;
  color:#555;
}

.song-number{
  font-size:11px;
  color:#888;
}

/* 結果画面：見出し中央ぞろえ */
.content h3{
  text-align: center;
}

/* 結果画面の説明文 */
.content p{
  text-align: center;
}

/* 楽曲リンクの見た目を通常カードのままに */
.song-link{
  text-decoration: none;
  color: inherit;
  display: block;
}

/* ホバー時に「押せる感」を出す（おすすめ） */
.song-link:hover .song-card{
  transform: translateY(-4px);
  box-shadow: 0 18px 36px rgba(0,0,0,0.18);
  transition: .2s;
}

/* ===== Retry Button ===== */

.retry-wrap{
  margin-top: 32px;
  text-align: center;
}

.retry-btn{
  padding: 16px 42px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--neg-strong), var(--pos-strong));
  color: #fff;
  box-shadow: var(--shadow-btn);
  transition: transform .15s, box-shadow .15s;
}

.retry-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 30px rgba(0,0,0,.22);
}

/* 診断結果メインのタイプ名 */
.mbti-nickname-main{
  text-align: center;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 14px;
  letter-spacing: 0.06em;
}

/* キャラクター画像表示 */
.character-wrap{
  display: flex;
  justify-content: center;
  margin: 12px 0 18px;
}


.character-image{
  width: 460px;
  height: 480px;            /* ほぼ正方形：縦は全身フル・横は中央を広めに取り切れ防止 */
  object-fit: cover;
  object-position: center;  /* 白背景の左右余白はページ(白)に溶け込む */
  transform: none;
  border-radius: 12px;
}


/* 結果画面専用：カードを縦に大きくする */
.result-card{
  min-height: 760px;   /* ★ 好みで 720〜820px に調整可 */
}

/* 上段：2カラム（PC）
   左に「見出し(head)＋本文(body)」を縦に、右に「キャラ画像(char)」を配置 */
.result-top{
  display: grid;
  grid-template-columns: 1fr 480px;
  grid-template-areas:
    "head char"
    "body char";
  column-gap: 32px;
  align-items: start;
  margin-top: 32px;
}

.result-head{ grid-area: head; text-align: left; margin-top: 32px; }
.result-body{ grid-area: body; text-align: left; }
.result-character{ grid-area: char; }

.result-text{
  text-align: left;
  margin-top: 32px;
}

.result-nickname{
font-size: 40px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 8px
}

.result-mbti{
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: #666;
  margin-bottom: 20px; /* 説明文との距離も少し広げる */
}
.result-rarity{
  display: flex;
  align-items: center;
  gap: 9px;
  margin-top: -8px;
  margin-bottom: 20px;
}
.result-rarity .dex-rarity-label{ font-size: 12px; font-weight: 800; letter-spacing: .14em; color: #888; }
.result-rarity .dex-rarity-stars{ display: inline-flex; gap: 3px; }
.result-rarity .dex-rarity-star{ width: 22px; height: 22px; }

.result-description{
  font-size: 20px;
  line-height: 1.8;
  text-align: left;

}

.result-character{
  display: flex;
  justify-content: center;
  margin-top: 40px;   /* 見出し(margin-top:32px)より少し下げ、4本目のバー付近まで下げる */
}

.character-image{
  width: 460px;
  height: 480px;           /* ほぼ正方形：縦は全身フル・横は中央を広めに取り切れ防止 */
  object-fit: cover;
  object-position: center; /* 白背景の左右余白はページ(白)に溶け込む */
  transform: none;
  border-radius: 12px;
}

.result-bottom{
  margin-top: 28px;
  padding-bottom: 20px;
}

.result-bottom h3{
  text-align: center;
}

/* 結果画面だけスクロール可能にする */
.result-screen{
  max-width: 1100px;
  height: auto;
  overflow: visible;
  margin: 0 auto;
  padding-bottom: 20px;

}
/* ===== TOP Overlay ===== */
.top-overlay{
  position: fixed;                 /* 画面基準で固定 */
  inset: 0;                        /* 上下左右すべて覆う */
  z-index: 10000;                  /* ヘッダーやカードより前 */
  /* PC版の壁紙（横長）。「カラオケMBTI」の文字は画像内に含まれる */
  background: #10121a url('character/TopImage_PC.png') center center / cover no-repeat;

  display: flex;                   /* 中央寄せ */
  align-items: center;
  justify-content: center;
}
.top-overlay .start-btn{
  padding: 16px 52px;
  font-size: 19px;
  font-weight: 800;
  letter-spacing: 0.08em;
  border-radius: 999px;
  cursor: pointer;
  margin: 0;                                 /* 画面中央に配置 */
  /* 半透明（透け感）＋すりガラス */
  background: rgba(255,255,255,0.16);
  border: 1.5px solid rgba(255,255,255,0.65);
  backdrop-filter: blur(7px);
  -webkit-backdrop-filter: blur(7px);
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,0.45);
  box-shadow: 0 8px 26px rgba(0,0,0,0.30);
  transition: background .15s, transform .15s, box-shadow .15s;
}

.top-overlay .start-btn:hover{
  transform: translateY(-2px);
  background: rgba(255,255,255,0.28);        /* ホバーで少し濃く */
  box-shadow: 0 14px 32px rgba(0,0,0,.35);
}

.top-overlay-inner{
  text-align: center;
}

.top-overlay h1{ /* TOP画面タイトル（ネオン風・壁紙の上に重ねる） */
  margin: 0 0 30px;
  font-size: clamp(32px, 4.4vw, 54px);
  font-weight: 900;
  letter-spacing: 0.08em;
  color: #fff;                               /* 白い芯 */
  text-shadow:
    0 0 4px #fff,
    0 0 10px #ff5ab8,
    0 0 22px #ff2d9b,
    0 0 44px #ff2d9b,
    0 0 72px #ff2d9b;                        /* ピンクのネオングロー */
  animation: neonPulse 2.6s ease-in-out infinite;
}
@keyframes neonPulse{
  0%, 100%{
    text-shadow:
      0 0 4px #fff,
      0 0 10px #ff5ab8,
      0 0 22px #ff2d9b,
      0 0 44px #ff2d9b,
      0 0 72px #ff2d9b;
  }
  50%{
    text-shadow:
      0 0 4px #fff,
      0 0 13px #ff5ab8,
      0 0 30px #ff2d9b,
      0 0 58px #ff2d9b,
      0 0 96px #ff2d9b;
  }
}

.top-overlay button{
  padding: 14px 44px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  margin-bottom: 32px;
  background: linear-gradient(135deg,var(--neg-strong),var(--pos-strong));
  color: #fff;
}

.top-overlay img{
  max-width: 1700px;
  max-height: 55vh;
  width: 100%;
  height: auto;
  object-fit: contain;
}
.top-overlay{
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: #10121a url('character/TopImage_PC.png') center center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.top-overlay-inner{
  text-align: center;
  transform: translateY(8vh);     /* PC: 中央より下げて歌うキャラの顔に被らないように */
}

/* ボタンと画像の間隔 */
.top-image-wrap{
  margin-top: 24px;
}


/* ===== 旧スマホ調整ブロックA・無効化（末尾の「スマホ最適化 決定版」に統合） ===== */
@media (max-width: 0px){
  
  @media (max-width: 768px){

/* カードは1枚表示にする */
.card-shell{
  position: relative;
  inset: auto;

  width: 100%;
}

.card-shell.next{
  display: none !important;
}

/* ===== 進捗の数値表示 ===== */
.progress-num{
  margin-top:6px;
  text-align:center;
  font-size:13px;
  font-weight:700;
  color:#666;
  letter-spacing:0.04em;
}

/* ===== タイプ別グループ色 ===== */
.theme-analyst{ --type-color:#88619a; } /* 分析家(NT) 紫 */
.theme-diplomat{ --type-color:#33a474; } /* 外交官(NF) 緑 */
.theme-sentinel{ --type-color:#4298b4; } /* 番人(SJ) 青 */
.theme-explorer{ --type-color:#d8a32f; } /* 探検家(SP) 黄 */

/* タイプ色を結果各所へ反映 */
.result-nickname{ color:var(--type-color); }
.result-screen .retry-btn{ background:var(--type-color); }

/* グループ・バッジ */
.result-group{
  display:inline-block;
  margin-bottom:10px;
  padding:4px 14px;
  font-size:13px;
  font-weight:700;
  color:#fff;
  background:var(--type-color);
  border-radius:999px;
  letter-spacing:0.08em;
}

/* ===== 16Personalities風 軸パーセンテージバー ===== */
.axis-item{ margin:18px 0; }
.axis-top{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#9aa0a6;
  margin-bottom:7px;
}
.axis-top .dom{
  color:var(--type-color);
  font-weight:800;
}
.axis-track{
  display:flex;
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:#e7e9ee;
}
.axis-track .seg{ height:100%; transition:width .6s ease; }
.axis-track .seg.on{ background:var(--type-color); }

/* ===== シェアボタン ===== */
.share-wrap{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.share-btn{
  padding:10px 22px;
  font-size:14px;
  font-weight:700;
  border-radius:999px;
  border:2px solid var(--type-color);
  background:#fff;
  color:var(--type-color);
  cursor:pointer;
  transition:.15s;
}
.share-btn:hover{
  background:var(--type-color);
  color:#fff;
}

/* ===== 結果表示中のレイアウト（ヘッダーに隠れない・上詰めスクロール） ===== */
.card-shell.result-shell{
  position: relative;   /* absolute解除：通常フローで高さを持たせる */
  inset: auto;
  transform: none;
  opacity: 1;
  z-index: auto;
}
body.result-mode .stage{
  height: auto;
  min-height: 100vh;
  align-items: flex-start;   /* 中央寄せ→上寄せ（上が隠れない） */
  padding-top: 130px;        /* 固定ヘッダー分の余白 */
  padding-bottom: 48px;
}
body.result-mode .deck{
  height: auto;              /* 固定520px解除：内容に合わせて伸びる */
}


/* =========================================================
   スマートフォン最適化（決定版・末尾で優先適用）
   ※ PC版レイアウトはそのまま。スマホ(≤768px)だけを再構成。
   TOP / 質問 / 結果 の全画面をスマホ向けに整える。
   ========================================================= */
@media (max-width: 768px){

  html, body{
    overflow-x: hidden;
    overflow-y: auto;
  }
  body{
    -webkit-text-size-adjust: 100%;   /* 自動文字拡大を無効化 */
  }

  /* ---------- TOP画面（診断開始）：壁紙＋中央の半透明ボタン ---------- */
  .top-overlay{
    align-items: center;              /* 上下中央 */
    justify-content: center;          /* 左右中央 */
    padding: 24px 20px;
    /* スマホ版の壁紙（縦長）。contain で全体を表示（拡大・左右カットを防ぐ）
       画像に収まらない上下は下地色(#10121a)で自然に繋ぐ */
    background: #10121a url('character/TopImage_Smartphone.png') center center / contain no-repeat;
  }
  .top-overlay-inner{
    transform: none;                  /* PCの translateY を解除 */
    width: auto;
    margin: auto;                     /* 画面中央 */
  }
  .top-overlay h1{
    font-size: clamp(24px, 7.5vw, 38px);
    margin: 0 0 20px;
  }
  .top-overlay .start-btn,
  .top-overlay button{
    padding: 15px 46px;
    font-size: 17px;
    margin: 0;                        /* 中央配置 */
  }

  /* ---------- ヘッダー（固定・進捗バー） ---------- */
  .header{
    padding: 12px 16px 10px;
  }
  .header h1{
    font-size: 19px;
    margin: 0 0 8px;
  }
  .progress-num{
    font-size: 12px;
  }

  /* ---------- ステージ / デッキ（質問カードは縦スライド） ---------- */
  /* デッキを画面全体に広げ、はみ出したカードは「画面の外」だけで自然に見切れる。
     小さな箱で切り取らない（意図的な表示範囲を作らない）。 */
  .stage{
    height: 100vh;
    min-height: 100vh;
    align-items: stretch;
    padding: 0;
  }
  .deck{
    position: relative;
    width: 100%;
    max-width: 100%;
    height: 100vh;                    /* 画面全体を基準に */
    overflow: hidden;                 /* 画面の外だけ自然に見切れる */
  }

  /* ---------- カード（縦方向スライド・カルーセル） ---------- */
  /* 質問カードだけ絶対配置で重ねる（結果カードは除外）。高さは内容にフィット。
     前後カードは画面内に収まる範囲はすべて表示し、画面の外だけで見切れる。
     前カードはタップで戻れる（PC同様）。 */
  .card-shell:not(.result-shell){
    position: absolute;
    left: 16px;
    right: 16px;
    top: 50%;                         /* 画面中央に配置 */
    bottom: auto;                     /* inset:0 の bottom を解除し高さを内容依存に */
    height: auto;                     /* 内容の高さにフィット（余白を圧縮） */
    display: block;
    transition: transform .35s ease, opacity .3s ease;
  }
  .card-shell:not(.result-shell).active{
    transform: translateY(-50%) scale(1);
    opacity: 1;                                /* 中央カードははっきり表示（回答対象） */
    z-index: 3;
  }
  .card-shell:not(.result-shell).prev{
    transform: translateY(-150%) scale(.95);   /* 真上（画面上端の外へ自然に抜ける） */
    opacity: .4;                               /* 前カードは薄く（Web版と同様） */
    z-index: 2;
    cursor: pointer;                           /* ← タップで前の質問に戻れる */
  }
  .card-shell:not(.result-shell).next{
    transform: translateY(50%) scale(.95);     /* 真下（画面下端の外へ自然に抜ける） */
    opacity: .4;                               /* 次カードは薄く */
    z-index: 1;
    pointer-events: none;                      /* 次カードはタップ無効 */
  }
  /* スライドで抜けるカードはしっかりフェードアウトさせる */
  .card-shell:not(.result-shell).fade-out{
    opacity: 0;
  }
  .card{
    height: auto;                     /* 内容にフィット：上下の余白を圧縮 */
    padding: 22px 20px;
    border-radius: 20px;
    box-shadow: 0 5px 16px rgba(0,0,0,0.08);  /* 影を小さく（画面端に干渉しない） */
  }
  .content{
    width: 100%;
    height: auto;
  }

  /* ---------- 質問画面 ---------- */
  .q-text{
    font-size: 19px;
    line-height: 1.55;
    margin: 0 0 6px;
  }
  .scale{
    position: relative;               /* PCの絶対配置を解除 */
    top: auto;
    left: auto;
    transform: none;
    max-width: 100%;
    margin-top: 34px;
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: center;
  }
  .scale-foot{
    position: relative;
    bottom: auto;
    width: 100%;
    margin-top: 18px;
    padding: 0 2px;
    font-size: 12px;
  }
  /* 7段階の丸を画面幅に収める（両端そろえ＋自動間隔） */
  .choice{
    -webkit-tap-highlight-color: transparent;
    border-width: 2.5px;
    flex-shrink: 0;
  }
  .choice.big{   width: 46px; height: 46px; }
  .choice.mid{   width: 38px; height: 38px; }
  .choice.small{ width: 32px; height: 32px; }
  .choice.tiny{  width: 26px; height: 26px; }
  /* タップ後にホバーが残って浮いたままになるのを防ぐ */
  .choice:hover{
    transform: none;
    box-shadow: var(--shadow-btn);
  }
  .choice.selected{
    transform: scale(1.06);
  }

  /* ---------- 結果画面 ---------- */
  body.result-mode .stage{
    padding-top: 112px;   /* 楽曲フロー付きヘッダー分を確保 */
    padding-bottom: 36px;
  }
  body.result-mode .deck{
    height: auto;
    overflow: visible;
  }
  .result-screen{
    max-width: 100%;
    padding: 0 16px 16px;
  }
  /* スマホは縦1列：見出し(名前・タイプ) → キャラ画像 → 本文(説明・バー) の順 */
  .result-top{
    display: block;
    margin-top: 6px;
  }
  .result-head{
    width: 100%;
    margin-top: 0;
    text-align: center;
  }
  .result-body{
    width: 100%;
    margin-top: 4px;
    text-align: center;
  }
  .result-group{
    margin-bottom: 8px;
  }
  .result-nickname{
    font-size: 28px;
    line-height: 1.15;
  }
  .result-mbti{
    font-size: 15px;
    margin-bottom: 6px;
  }
  .result-rarity{
    justify-content: center;
    margin-top: 0;
    margin-bottom: 8px;
  }
  .result-rarity .dex-rarity-star{ width: 20px; height: 20px; }
  .result-description{
    font-size: 16px;
    line-height: 1.75;
    text-align: left;
    margin-top: 4px;
  }
  .result-character{
    display: flex;
    justify-content: center;
    margin: 10px 0 6px;
  }
  .result-character .character-image{
    width: 250px;
    height: 260px;                    /* ほぼ正方形：全身を切らずに表示 */
    transform: none;
    border-radius: 16px;
  }
  .axis-area{
    margin-top: 22px;
  }
  .axis-item{
    margin: 14px 0;
  }
  .axis-top{
    font-size: 13px;
  }

  /* おすすめ楽曲：横1列（3枚は収まらないので横スクロール可能に） */
  .result-bottom{
    margin-top: 26px;
    padding-bottom: 32px;             /* 最下部の安全余白 */
  }
  .songs{
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: flex-start;
    align-items: stretch;
    gap: 12px;
    margin-top: 14px;
    padding: 4px 4px 12px;
    overflow-x: auto;                 /* はみ出す分は横スクロール */
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
  }
  /* スクロールバーを細く（対応ブラウザ） */
  .songs::-webkit-scrollbar{ height: 6px; }
  .songs::-webkit-scrollbar-thumb{
    background: rgba(0,0,0,.2);
    border-radius: 999px;
  }
  .song-card{
    flex: 0 0 auto;                   /* 縮まず横に並ぶ */
    width: 144px;
    max-width: none;
    padding: 10px;
    scroll-snap-align: start;
  }
  .song-card img{
    height: 120px;
  }
  /* 曲名・アーティストは1行に収める（あふれたら…で省略） */
  .song-title{
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist{
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-number{ font-size: 11px; }

  /* 共有・もう一度診断 */
  .share-wrap{
    margin-top: 20px;
    gap: 10px;
  }
  .share-btn{
    padding: 11px 20px;
    font-size: 14px;
  }
  .retry-wrap{
    margin-top: 24px;
  }
  .retry-btn{
    width: 100%;
    max-width: 320px;
    padding: 16px 24px;
    font-size: 17px;
  }
}

/* ---------- 極小画面（iPhone SE 等・360px以下）の微調整 ---------- */
@media (max-width: 360px){
  .card{ padding: 22px 16px; }
  .choice.big{   width: 42px; height: 42px; }
  .choice.mid{   width: 35px; height: 35px; }
  .choice.small{ width: 29px; height: 29px; }
  .choice.tiny{  width: 24px; height: 24px; }
  .scale-foot{ font-size: 11px; }
  .result-character .character-image{ width: 200px; height: 208px; }
}


/* =========================================================
   ▼▼▼ ダークネオンテーマ（回答中・結果画面をTOP壁紙の雰囲気に統一）
   ★元に戻す方法：この見出しから下の「▲▲▲ ここまで」までを丸ごと削除するだけ。
   ========================================================= */

/* 背景：暗いカラオケルーム風＋ピンク/シアンのネオングロー */
body{
  color: #e9eaf2;
  background:
    radial-gradient(900px 520px at 12% -6%, rgba(255,45,155,0.13), transparent 62%),
    radial-gradient(900px 520px at 92% 8%,  rgba(45,210,255,0.13), transparent 62%),
    linear-gradient(165deg, #17121f 0%, #0d0e18 55%, #120d1a 100%);
}

/* ヘッダー（進捗バー） */
.header{
  background: rgba(12,13,22,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header h1{
  color: #fff;
  text-shadow: 0 0 10px rgba(255,45,155,0.55), 0 0 22px rgba(255,45,155,0.35);
}
.progress-wrap{ background: rgba(255,255,255,0.12); }
.progress-bar{ background: linear-gradient(90deg, #ff2d9b, #7a5cff 50%, #2dd4ff); }
.progress-num{ color: rgba(255,255,255,0.72); }

/* 質問カード：ダークすりガラス＋明るい文字 */
.card{
  background: rgba(22,24,38,0.62);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 12px 34px rgba(0,0,0,0.50);
}
.q-text{ color: #f2f3f8; }
.scale-foot{ color: rgba(255,255,255,0.6); }
.choice.selected{
  box-shadow: 0 0 0 3px rgba(255,255,255,0.10),
              0 0 18px rgba(255,255,255,0.25),
              0 18px 34px rgba(0,0,0,0.4);
}

/* 結果画面：本文・軸バー・見出しを明るく */
.result-description{ color: #e6e7f0; }
.result-mbti{ color: rgba(255,255,255,0.68); }
.result-bottom h3{ color: #f2f3f8; }
.axis-top{ color: rgba(255,255,255,0.55); }
.axis-track{ background: rgba(255,255,255,0.14); }
.axis-note{ color: rgba(255,255,255,0.5); }
.result-nickname{ text-shadow: 0 0 22px currentColor, 0 2px 10px rgba(0,0,0,0.5); }

/* キャラ画像（白背景）はダーク上でフレーム＋淡いネオングロー */
.character-image{
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 26px rgba(255,45,155,0.22), 0 12px 32px rgba(0,0,0,0.5);
}

/* おすすめ楽曲カード：ダークガラス */
.song-card{
  background: rgba(26,28,44,0.72);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 22px rgba(0,0,0,0.42);
}
.song-title{ color: #f0f1f7; }
.song-artist{ color: rgba(255,255,255,0.6); }
.song-number{ color: rgba(255,255,255,0.45); }

/* シェアボタン：ダーク下地 */
.share-btn{ background: rgba(255,255,255,0.06); color: #fff; }
.share-btn:hover{ background: var(--type-color); color: #fff; }

/* ▲▲▲ ダークネオンテーマ ここまで */


/* =========================================================
   ▼▼▼ キャラクター図鑑（コレクション）オーバーレイ
   ========================================================= */
.dex-overlay{
  position: fixed;
  inset: 0;
  z-index: 11000;
  display: none;                     /* JSで flex に */
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background: rgba(8,9,16,0.86);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0;
  transition: opacity .35s ease;     /* ← フェードイン/アウト */
}
.dex-overlay.show{ opacity: 1; }

.dex-panel{
  width: min(920px, 100%);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(160deg, #17131f, #0f1018);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  overflow: hidden;
  transform: translateY(10px) scale(.98);
  transition: transform .35s ease;
}
.dex-overlay.show .dex-panel{ transform: translateY(0) scale(1); }

.dex-header{
  position: relative;
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  text-align: center;
}
.dex-title{
  margin: 0;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: .06em;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,45,155,.5), 0 0 22px rgba(45,210,255,.35);
}
.dex-count-wrap{ margin-top: 5px; font-size: 13px; color: rgba(255,255,255,.65); }
#dexCount{ color: #ff6fc0; font-weight: 800; }
.dex-close{
  position: absolute; top: 12px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.06); color: #fff;
  font-size: 20px; line-height: 1; cursor: pointer;
}
.dex-close:hover{ background: rgba(255,255,255,.15); }

.dex-body{ flex: 1; min-height: 0; overflow-y: auto; }
.dex-grid[hidden], .dex-detail[hidden]{ display: none; }

.dex-grid{
  padding: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.dex-card{
  position: relative;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px 10px 12px;
  text-align: center;
}
.dex-card.got{ cursor: pointer; transition: transform .12s, border-color .15s, box-shadow .15s; }
.dex-card.got:hover{
  transform: translateY(-3px);
  border-color: rgba(255,255,255,.25);
  box-shadow: 0 10px 26px rgba(0,0,0,.4);
}
.dex-card.locked{ opacity: .6; }
.dex-img{
  height: 122px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px; overflow: hidden; margin-bottom: 8px;
  background: rgba(0,0,0,0.25);
}
.dex-img img{ width: 100%; height: 100%; object-fit: cover; object-position: center; }
.dex-q{ font-size: 48px; font-weight: 900; color: rgba(255,255,255,0.22); }
.dex-group{
  display: inline-block; margin-bottom: 5px; padding: 2px 10px;
  font-size: 11px; font-weight: 800; color: #fff;
  background: var(--type-color, #888); border-radius: 999px;
}
.dex-name{ font-size: 13px; font-weight: 700; color: #e9eaf2; line-height: 1.3; }
.dex-mbti{ margin-top: 3px; font-size: 11px; font-weight: 700; letter-spacing: .08em; color: rgba(255,255,255,0.5); }
.dex-card.locked .dex-name{ color: rgba(255,255,255,0.4); }

/* 今回追加されたキャラ：強調＋ポップイン演出 */
.dex-badge{
  position: absolute; top: -8px; right: -6px; z-index: 2;
  padding: 3px 10px; font-size: 11px; font-weight: 900; color: #fff;
  background: linear-gradient(90deg,#ff2d9b,#ff7a3d);
  border-radius: 999px;
  box-shadow: 0 4px 12px rgba(255,45,155,.5);
}
.dex-card.is-current{
  border-color: rgba(255,45,155,.7);
  box-shadow: 0 0 0 2px rgba(255,45,155,.4), 0 0 26px rgba(255,45,155,.4);
}
.dex-card.is-new{ animation: dexPop .7s cubic-bezier(.2,1.3,.5,1) both; }
@keyframes dexPop{
  0%{ transform: scale(.4); opacity: 0; }
  60%{ transform: scale(1.08); opacity: 1; }
  100%{ transform: scale(1); opacity: 1; }
}

/* ---- 詳細ビュー ---- */
.dex-detail{ padding: 20px; }
.dex-detail-back{
  margin-bottom: 16px; padding: 8px 16px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06);
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
}
.dex-detail-back:hover{ background: rgba(255,255,255,.14); }
.dex-detail-top{ display: flex; flex-direction: column; gap: 14px; align-items: center; text-align: center; margin-bottom: 18px; }
.dex-detail-info{ text-align: center; }
.dex-detail-img{
  width: 190px; height: 200px; flex-shrink: 0;
  object-fit: cover; object-position: center; border-radius: 14px;
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 0 24px rgba(255,45,155,.2), 0 10px 28px rgba(0,0,0,.5);
}
.dex-detail-group{
  display: inline-block; margin-bottom: 8px; padding: 3px 14px;
  font-size: 13px; font-weight: 800; color: #fff;
  background: var(--type-color, #888); border-radius: 999px;
}
.dex-detail-name{ font-size: 26px; font-weight: 900; color: #fff; line-height: 1.2; }
.dex-detail-mbti{ margin-top: 5px; font-size: 14px; font-weight: 700; letter-spacing: .14em; color: rgba(255,255,255,.6); }
.dex-detail-rarity{ display: flex; align-items: center; justify-content: center; gap: 9px; margin-top: 10px; }
.dex-detail-rarity .dex-rarity-label{ font-size: 12px; font-weight: 800; letter-spacing: .14em; color: rgba(255,255,255,.55); }
.dex-detail-rarity .dex-rarity-stars{ display: inline-flex; gap: 3px; }
.dex-rarity-star{ width: 24px; height: 24px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(255,205,70,.55)); }
.dex-detail-desc{
  font-size: 15px; line-height: 1.85; color: #dfe1ec;
  background: rgba(255,255,255,0.04); border-radius: 12px;
  padding: 14px 16px; margin-bottom: 20px;
  white-space: pre-line; text-align: center;
}

/* ---- 出した人メモ（複数人・箇条書き） ---- */
.dex-people-title{ font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 10px; }
.dex-people-list{ list-style: none; margin: 0 0 12px; padding: 0; }
.dex-people-list li{
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; margin: 6px 0;
  background: rgba(255,255,255,0.05); border-radius: 9px;
}
.dex-people-list li::before{ content: "•"; color: var(--type-color, #ff6fc0); font-weight: 900; font-size: 16px; }
.dex-people-list li .dex-person-name{ flex: 1; color: #e9eaf2; font-size: 14px; word-break: break-all; }
.dex-people-list li.dex-people-empty{ display: block; background: none; padding: 0; margin: 0 0 12px; color: rgba(255,255,255,.45); font-size: 13px; }
.dex-people-list li.dex-people-empty::before{ content: none; }
.dex-people-remove{
  border: none; background: transparent; color: rgba(255,120,150,.9);
  font-size: 18px; line-height: 1; cursor: pointer; padding: 0 4px;
}
.dex-people-remove:hover{ color: #ff5a86; }
.dex-people-add{ display: flex; gap: 8px; }
.dex-people-input{
  flex: 1; padding: 10px 12px; font-size: 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,.16); background: rgba(0,0,0,.3); color: #fff;
}
.dex-people-input::placeholder{ color: rgba(255,255,255,.4); }
.dex-people-input:focus{ outline: none; border-color: #ff6fc0; box-shadow: 0 0 0 2px rgba(255,45,155,.3); }
.dex-people-addbtn{
  padding: 10px 22px; border-radius: 10px; border: none; cursor: pointer;
  font-weight: 800; color: #fff; background: linear-gradient(135deg,#ff2d9b,#7a5cff);
}
.dex-people-addbtn:hover{ transform: translateY(-1px); }

/* =========================================================
   診断ロジック（旧 scorer / mbti / recommender を移植）
   ========================================================= */
const THRESHOLD=0.25;

function scoreAnswers(qs,ans){
  const scores={E_I:0,S_N:0,T_F:0,J_P:0};
  const counts={E_I:0,S_N:0,T_F:0,J_P:0};
  for(const q of qs){
    if(!(q.id in ans)) continue;
    scores[q.axis]+=ans[q.id]*q.direction;
    counts[q.axis]++;
  }
  for(const ax in scores){ if(counts[ax]>0) scores[ax]/=counts[ax]; }
  return scores;
}

function judgeAxis(score,pos,neg){
  if(score>THRESHOLD) return pos;
  if(score<-THRESHOLD) return neg;
  return Math.random()<0.5?pos:neg; // 差が小さい場合は揺らぎを許容
}

function determineMbti(s){
  return judgeAxis(s.E_I,"E","I")+judgeAxis(s.S_N,"S","N")+
         judgeAxis(s.T_F,"T","F")+judgeAxis(s.J_P,"J","P");
}

function axisPosition(val,maxAbs=4.0){
  if(Math.abs(val)<0.3) return 50;
  const v=Math.max(-maxAbs,Math.min(maxAbs,val));
  return Math.trunc((v+maxAbs)/(2*maxAbs)*100);
}

function getEiSuffix(mbti,trap){
  const primary=mbti[0];
  if(trap===undefined||trap===null||Math.abs(trap)<0.3) return "-"+primary;
  if(primary==="E") return trap>0?"-e":"-E";
  return trap<0?"-i":"-I";
}

function recommend(scores,topN=3){
  return SONGS
    .map(s=>({s,d:Math.hypot(s.E_I-scores.E_I,s.S_N-scores.S_N,s.T_F-scores.T_F,s.J_P-scores.J_P)}))
    .sort((a,b)=>a.d-b.d)
    .slice(0,topN)
    .map(x=>x.s);
}

// 旧 /diagnose API と同じ形のオブジェクトを返す
function diagnose(answers){
  const scores=scoreAnswers(QUESTIONS,answers);
  const mbti=determineMbti(scores);
  const diag=MBTI_DESCRIPTIONS[mbti];
  const display_mbti=mbti+getEiSuffix(mbti,answers["Q_TRAP_EI"]);
  return {
    mbti,
    display_mbti,
    nickname:diag.nickname,
    title:diag.title,
    description:diag.text,
    character_image:`character/${mbti}_${diag.nickname}.png`,
    scores,
    axis_position:{
      E_I:axisPosition(scores.E_I),
      S_N:axisPosition(scores.S_N),
      T_F:axisPosition(scores.T_F),
      J_P:axisPosition(scores.J_P)
    },
    recommended_songs:recommend(scores,3).map(s=>({
      title:s.title,
      artist:s.artist,
      number:s.number,
      jacket_path:`jacket/${s.jacket}`,
      link:s.link
    }))
  };
}

/* 進捗バー = 楽曲の構成フロー（Aメロ→Bメロ→サビ→Aメロ→Bメロ→ラスサビ） */
const SONG_SECTIONS=[
  {name:"Aメロ",   count:4},
  {name:"Bメロ",   count:3},
  {name:"サビ",    count:3},
  {name:"Aメロ",   count:4},
  {name:"Bメロ",   count:3},
  {name:"ラスサビ", count:3}
];  // 合計20（questions.length と一致）

function buildSongFlow(){
  songFlow.innerHTML = SONG_SECTIONS.map((s,i)=>`
    <div class="flow-seg" data-i="${i}" style="flex-grow:${s.count}">
      <div class="flow-bar"><div class="flow-bar-fill"></div></div>
      <span class="flow-label">${s.name}</span>
    </div>
  `).join("");
}

function updateBar(){
  const total = questions.length;
  const answered = Math.min(current, total);   // 回答済み数
  let cum = 0, curName = "";
  SONG_SECTIONS.forEach((s,i)=>{
    const seg = songFlow.children[i];
    if(!seg) return;
    const fill  = seg.querySelector(".flow-bar-fill");
    const start = cum, end = cum + s.count;
    let pct = 0;
    if(answered >= end)      pct = 100;
    else if(answered > start) pct = (answered - start) / s.count * 100;
    fill.style.width = pct + "%";
    seg.classList.toggle("is-done", answered >= end);
    const isCur = current >= start && current < end && current < total;
    seg.classList.toggle("is-current", isCur);
    if(isCur) curName = s.name;
    cum = end;
  });
  const n = Math.min(current+1, total);
  progressNum.textContent = (current >= total)
    ? `フィナーレ！　${total} / ${total}`
    : `${curName}　${n} / ${total}`;
}

// MBTI を4グループに分類（結果画面のテーマ色・バッジ用）
function typeGroup(mbti){
  const isN=mbti.includes("N"), isT=mbti.includes("T"), isJ=mbti.includes("J");
  if(isN&&isT)  return {cls:"theme-analyst",  name:"分析家"};
  if(isN&&!isT) return {cls:"theme-diplomat", name:"外交官"};
  if(!isN&&isJ) return {cls:"theme-sentinel", name:"番人"};
  return {cls:"theme-explorer", name:"探検家"};
}

// 16Personalities風の軸バーHTMLを生成
// pos = 0〜100（正の特性 E/S/T/J 側の割合）
function axisRow(pos,leftName,rightName){
  const left=Math.round(pos), right=100-left;
  const domLeft=left>=right;
  return `
    <div class="axis-item">
      <div class="axis-top">
        <span class="${domLeft?'dom':''}">${leftName} ${left}%</span>
        <span class="${domLeft?'':'dom'}">${right}% ${rightName}</span>
      </div>
      <div class="axis-track">
        <div class="seg ${domLeft?'on':''}" style="width:${left}%"></div>
        <div class="seg ${domLeft?'':'on'}" style="width:${right}%"></div>
      </div>
    </div>`;
}

function buildAxes(ap){
  return (
    axisRow(ap.E_I,"外向型","内向型")+
    axisRow(ap.S_N,"感覚型","直観型")+
    axisRow(ap.T_F,"思考型","感情型")+
    axisRow(ap.J_P,"判断型","知覚型")
  );
}

function render(){
  deck.innerHTML="";
  if(current>0) deck.appendChild(makeCard(current-1,"prev"));
  deck.appendChild(makeCard(current,"active"));
  if(current+1<questions.length)
    deck.appendChild(makeCard(current+1,"next"));
}

function makeCard(i,pos){
  const el=document.createElement("div");
  el.className=`card-shell ${pos}`;
  el.innerHTML=`
    <div class="card">
      <div class="content">
        <div class="q-text">${questions[i].text}</div>
        <div class="scale">
          ${SCALE.map(s=>`<div class="choice ${s.cls}" data-v="${s.v}"></div>`).join("")}
        </div>
        <div class="scale-foot">
          <span>当てはまらない</span>
          <span>当てはまる</span>
        </div>
      </div>
    </div>
  `;

  if(answers[questions[i].id]!==undefined){
    const sel=el.querySelector(`.choice[data-v="${answers[questions[i].id]}"]`);
    if(sel) sel.classList.add("selected");
  }

  if(pos==="active"){
    el.querySelectorAll(".choice").forEach(btn=>{
      btn.onclick=()=>{
        if(anim)return;
        anim=true;
        deck.style.pointerEvents="none";   // 遷移中はホバー/クリック無効（丸が浮くのを防ぐ）

        el.querySelectorAll(".choice").forEach(c=>c.classList.remove("selected"));
        btn.classList.add("selected");

        answers[questions[current].id]=Number(btn.dataset.v);

        // ★ 点灯（selected）を見せてからカードをスライドさせる
        setTimeout(()=>{
          const prev=document.querySelector(".card-shell.prev");
          const next=document.querySelector(".card-shell.next");

          if(prev) prev.classList.add("fade-out");

          if(current+2<questions.length){
            const newNext=makeCard(current+2,"next");
            newNext.style.opacity="0";      // まず透明で追加
            deck.appendChild(newNext);
            void newNext.offsetWidth;        // opacity:0 を確定させる（reflow）
            newNext.style.opacity="";        // → CSSの透明度へ向けてフェードイン
          }

          el.classList.remove("active");
          el.classList.add("prev");

          if(next){
            next.classList.remove("next");
            next.classList.add("active");
          }

          setTimeout(()=>{
            current++;
            anim=false;
            deck.style.pointerEvents="";

            if(current === questions.length){
              fetchResult();
            }else{
              updateBar();
              render();
            }
          },350);
        }, 240);   // ← 点灯を見せる時間
      };
    });
  }

  if(pos==="prev"){
    el.onclick=()=>{
      if(anim)return;
      anim=true;
      deck.style.pointerEvents="none";

      const active=document.querySelector(".card-shell.active");
      active.classList.remove("active");
      active.classList.add("next","fade-out");

      el.classList.remove("prev");
      el.classList.add("active");

      setTimeout(()=>{
        current=i;
        for(let k=i+1;k<questions.length;k++)
          delete answers[questions[k].id];
        anim=false;
        deck.style.pointerEvents="";
        updateBar();
        render();
      },350);
    };
  }

  return el;
}

      if(document.body.classList.contains("result-mode")) openDex(d.mbti, d.display_mbti);
    }, 1800);

    /* ★ 結果のコピー / シェア */
    const shareText = `カラオケ性格診断の結果は「${d.nickname}（${d.display_mbti}）」でした！`;
    const shareUrl = location.href;
    const copyBtn = document.getElementById("copyBtn");
    const shareBtn = document.getElementById("shareBtn");

    function flash(btn,msg){
      const old=btn.textContent;
      btn.textContent=msg;
      setTimeout(()=>{ btn.textContent=old; },1500);
    }
    function copyResult(){
      const text=shareText+" "+shareUrl;
      if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(text)
          .then(()=>flash(copyBtn,"コピーしました"))
          .catch(()=>fallbackCopy(text));
      }else{
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text){
      const ta=document.createElement("textarea");
      ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); flash(copyBtn,"コピーしました"); }
      catch(e){ flash(copyBtn,"コピーできません"); }
      document.body.removeChild(ta);
    }

    copyBtn.onclick=copyResult;
    shareBtn.onclick=()=>{
      if(navigator.share){
        navigator.share({title:"カラオケ性格診断",text:shareText,url:shareUrl}).catch(()=>{});
      }else{
        copyResult();
      }
    };

    /* ★ もう一度診断する */
    document.getElementById("retryBtn").onclick = () => {
      clearTimeout(dexAutoTimer);
      closeDex();
      current = 0;
      answers = {};
      updateBar();                   // 楽曲フローを先頭に戻す

      // ★ 結果表示モードを解除して質問画面レイアウトに戻す
      document.body.classList.remove("result-mode");
      deck.style.height = "";

      render();
    };
}

/* =========================================================
   キャラクター図鑑（コレクション）
   - 取得状況・出した人（複数）を localStorage に保存
   - グリッド：グループ / ニックネーム / MBTI の3情報
   - カード選択で詳細（説明＋出した人メモ）を表示
   ========================================================= */
const DEX_KEY = "karaoke_mbti_dex_v1";
const DEX_ORDER = [
  "INTJ","INTP","ENTJ","ENTP",   // 分析家
  "INFJ","INFP","ENFJ","ENFP",   // 外交官
  "ISTJ","ISFJ","ESTJ","ESFJ",   // 番人
  "ISTP","ISFP","ESTP","ESFP"    // 探検家
];
let dexAutoTimer = null;
let dexCurrentMbti = null;

const dexOverlay = document.getElementById("dexOverlay");
const dexGrid    = document.getElementById("dexGrid");
const dexDetail  = document.getElementById("dexDetail");
const dexCount   = document.getElementById("dexCount");

function loadDex(){
  let dex;
  try{ dex = JSON.parse(localStorage.getItem(DEX_KEY)) || {}; }catch(e){ dex = {}; }
  // 旧形式(note:string) → 新形式(people:array) へ移行
  for(const m in dex){
    const e = dex[m];
    if(e && !Array.isArray(e.people)){
      const n = e.note && String(e.note).trim();
      e.people = n ? [n] : [];
      delete e.note;
    }
  }
  return dex;
}
function saveDex(dex){
  try{ localStorage.setItem(DEX_KEY, JSON.stringify(dex)); }catch(e){}
}
function escHtml(s){
  return String(s==null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function allCharacters(){
  return DEX_ORDER.map(mbti=>{
    const d = MBTI_DESCRIPTIONS[mbti];
    return { mbti, nickname:d.nickname, image:`character/${mbti}_${d.nickname}.png` };
  });
}

/* ---- グリッド（グループ / ニックネーム / MBTI の3情報） ---- */
function buildDexGrid(dex, currentMbti, isNew){
  const chars = allCharacters();
  const gotCount = chars.filter(c=>dex[c.mbti] && dex[c.mbti].obtained).length;
  dexCount.textContent = `${gotCount} / ${chars.length}`;

  dexGrid.innerHTML = chars.map(c=>{
    const e = dex[c.mbti];
    const has = e && e.obtained;
    const cur = c.mbti === currentMbti;
    const g = typeGroup(c.mbti);
    if(has){
      const label = e.label || c.mbti;
      return `
        <div class="dex-card got ${g.cls} ${cur?'is-current':''} ${cur&&isNew?'is-new':''}" data-mbti="${c.mbti}">
          ${cur&&isNew ? '<span class="dex-badge">NEW!</span>' : ''}
          <div class="dex-img"><img src="${c.image}" alt=""></div>
          <div class="dex-group">${escHtml(g.name)}</div>
          <div class="dex-name">${escHtml(c.nickname)}</div>
          <div class="dex-mbti">${escHtml(label)}</div>
        </div>`;
    }
    return `
      <div class="dex-card locked">
        <div class="dex-img"><span class="dex-q">?</span></div>
        <div class="dex-name">???</div>
      </div>`;
  }).join("");

  // カード選択 → 詳細へ
  dexGrid.querySelectorAll(".dex-card.got").forEach(card=>{
    card.onclick = ()=> openDetail(card.dataset.mbti);
  });

  // 今回のキャラを中央にスクロール
  if(currentMbti){
    const curEl = dexGrid.querySelector(".dex-card.is-current");
    if(curEl) setTimeout(()=>curEl.scrollIntoView({block:"center", behavior:"smooth"}), 60);
  }
}

/* ---- レア度（回答計算の出やすさに基づく：☆3普通〜☆5めずらしい）----
   E/S/T/J が出やすいポール、I/N/F/P が出にくいポール。
   出にくいポールを多く含む型ほどレアになる。 */
function rarityLevel(mbti){
  const minority = (mbti.match(/[INFP]/g) || []).length; // I/N/F/P の数
  if(minority >= 3) return 5;   // めずらしい
  if(minority === 2) return 4;
  return 3;                     // 普通
}
function rarityStarsHtml(mbti){
  const n = rarityLevel(mbti);
  return Array.from({length:n},
    ()=>'<img class="dex-rarity-star" src="character/star.png" alt="">').join("");
}

/* ---- 詳細（説明＋出した人メモ） ---- */
function openDetail(mbti){
  const dex = loadDex();
  const e = dex[mbti];
  if(!e || !e.obtained) return;
  dexCurrentMbti = mbti;

  const info  = MBTI_DESCRIPTIONS[mbti];
  const g     = typeGroup(mbti);
  const label = e.label || mbti;
  const image = `character/${mbti}_${info.nickname}.png`;

  dexDetail.className = `dex-detail ${g.cls}`;
  dexDetail.innerHTML = `
    <button class="dex-detail-back" type="button">一覧に戻る</button>
    <div class="dex-detail-top">
      <div class="dex-detail-info">
        <div class="dex-detail-group">${escHtml(g.name)}</div>
        <div class="dex-detail-name">${escHtml(info.nickname)}</div>
        <div class="dex-detail-mbti">${escHtml(label)}</div>
        <div class="dex-detail-rarity" title="レア度 ${rarityLevel(mbti)}">
          <span class="dex-rarity-label">レア度</span>
          <span class="dex-rarity-stars">${rarityStarsHtml(mbti)}</span>
        </div>
      </div>
      <img class="dex-detail-img" src="${image}" alt="">
    </div>
    <div class="dex-detail-desc">${escHtml(info.text)}</div>
    <div class="dex-people">
      <div class="dex-people-title">このキャラを出した人</div>
      <ul class="dex-people-list" id="dexPeopleList"></ul>
      <div class="dex-people-add">
        <input class="dex-people-input" id="dexPersonInput" type="text"
               placeholder="名前を入力して追加" maxlength="30">
        <button class="dex-people-addbtn" id="dexPersonAdd" type="button">追加</button>
      </div>
    </div>
  `;
  renderPeople();

  dexGrid.hidden = true;
  dexDetail.hidden = false;
  const body = dexOverlay.querySelector(".dex-body");
  if(body) body.scrollTop = 0;

  dexDetail.querySelector(".dex-detail-back").onclick = ()=>{
    dexDetail.hidden = true;
    dexGrid.hidden = false;
  };
  const input  = document.getElementById("dexPersonInput");
  const addBtn = document.getElementById("dexPersonAdd");
  function addPerson(){
    const name = input.value.trim();
    if(!name) return;
    const dx = loadDex();
    if(!dx[mbti]) dx[mbti] = { obtained:true, label, people:[] };
    if(!Array.isArray(dx[mbti].people)) dx[mbti].people = [];
    dx[mbti].people.push(name);
    saveDex(dx);
    input.value = "";
    renderPeople();
    input.focus();
  }
  addBtn.onclick = addPerson;
  input.addEventListener("keydown", ev=>{ if(ev.key==="Enter") addPerson(); });
}

/* ---- 出した人リスト（箇条書き・複数人） ---- */
function renderPeople(){
  const ul = document.getElementById("dexPeopleList");
  if(!ul) return;
  const dex = loadDex();
  const people = (dex[dexCurrentMbti] && dex[dexCurrentMbti].people) || [];
  if(!people.length){
    ul.innerHTML = `<li class="dex-people-empty">まだ登録がありません</li>`;
    return;
  }
  ul.innerHTML = people.map((p,i)=>`
    <li><span class="dex-person-name">${escHtml(p)}</span>
    <button class="dex-people-remove" data-i="${i}" type="button" aria-label="削除">×</button></li>
  `).join("");
  ul.querySelectorAll(".dex-people-remove").forEach(btn=>{
    btn.onclick = ()=>{
      const dx = loadDex();
      const arr = (dx[dexCurrentMbti] && dx[dexCurrentMbti].people) || [];
      arr.splice(Number(btn.dataset.i), 1);
      saveDex(dx);
      renderPeople();
    };
  });
}

/* ---- 開閉 ---- */
function openDex(currentMbti, label){
  const dex = loadDex();
  const isNew = !!currentMbti && !(dex[currentMbti] && dex[currentMbti].obtained);
  if(currentMbti){
    if(!dex[currentMbti]) dex[currentMbti] = { obtained:true, label:label||currentMbti, people:[] };
    dex[currentMbti].obtained = true;
    if(label) dex[currentMbti].label = label;
    if(!Array.isArray(dex[currentMbti].people)) dex[currentMbti].people = [];
    saveDex(dex);
  }
  dexCurrentMbti = currentMbti || null;
  dexDetail.hidden = true;   // 常に一覧から表示
  dexGrid.hidden = false;
  buildDexGrid(dex, currentMbti, isNew);
  dexOverlay.style.display = "flex";
  requestAnimationFrame(()=> dexOverlay.classList.add("show"));   // フェードイン
}

function closeDex(){
  dexOverlay.classList.remove("show");                            // フェードアウト
  setTimeout(()=>{ dexOverlay.style.display = "none"; }, 350);
}

document.getElementById("dexCloseBtn").onclick = closeDex;
document.getElementById("dexBackBtn").onclick  = closeDex;
dexOverlay.addEventListener("click", e=>{ if(e.target === dexOverlay) closeDex(); });
document.addEventListener("keydown", e=>{
  if(e.key === "Escape" && dexOverlay.classList.contains("show")) closeDex();
});

const topOverlay = document.getElementById("topOverlay");
const startBtn = document.getElementById("startBtn");

startBtn.onclick = () => {
  topOverlay.style.display = "none";
};

// ===== 初期表示 =====
buildSongFlow();
render();
updateBar();
</script>
